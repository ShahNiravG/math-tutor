<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Challenge Exam</title>
  <script>window.MathJax={tex:{inlineMath:[['\\(','\\)'],['$','$']],displayMath:[['\\[','\\]'],['$$','$$']]},options:{skipHtmlTags:['script','noscript','style','textarea','pre']}};</script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    :root { --bg:#f5f1e8; --paper:#fffaf2; --ink:#1f2a33; --muted:#5b6a74;
            --accent:#a14d2e; --accent-soft:#ead2c5; --line:#d8cfc2;
            --answered:#166534; --answered-bg:#dcfce7;
            --skipped:#854d0e; --skipped-bg:#fef9c3;
            --current:#1e40af; --current-bg:#dbeafe; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Georgia,"Times New Roman",serif; color:var(--ink);
           background:radial-gradient(circle at top left,#f8dfc8 0,transparent 28%),
                      linear-gradient(180deg,#f6efe3 0%,var(--bg) 100%);
           min-height:100vh; }

    /* ── Top bar ── */
    .topbar { position:sticky; top:0; z-index:100; background:rgba(255,250,242,.95);
              backdrop-filter:blur(8px); border-bottom:1px solid var(--line);
              padding:12px 24px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
    .topbar-brand { display:flex; align-items:center; gap:12px; min-width:260px; }
    .brand-mark { width:48px; height:48px; flex:0 0 48px; border-radius:14px; overflow:hidden;
                  box-shadow:0 10px 24px rgba(78,55,32,.12); }
    .brand-mark svg { display:block; width:100%; height:100%; }
    .brand-eyebrow { display:inline-block; font-size:.72rem; letter-spacing:.14em; text-transform:uppercase;
                     color:var(--muted); font-family:system-ui,sans-serif; font-weight:700; margin-bottom:2px; }
    .brand-title { margin:0; font-size:1.15rem; line-height:1.02; }
    .topbar-nav { display:flex; gap:10px; flex-wrap:wrap; }
    .nav-pill { display:inline-flex; align-items:center; justify-content:center;
                padding:9px 13px; border-radius:999px; border:1px solid var(--line);
                background:rgba(255,255,255,.72); color:var(--ink); text-decoration:none;
                font-family:system-ui,sans-serif; font-size:.85rem; font-weight:700; }
    .nav-pill.active { background:var(--accent-soft); border-color:#cabaa4; color:#6a2e16; }
    .nav-pill:hover { border-color:var(--accent); }
    .topbar-title { font-weight:700; font-size:1rem; flex:1; min-width:180px; }
    .timer { font-family:system-ui,monospace; font-size:1.1rem; font-weight:700;
             color:var(--accent); min-width:56px; text-align:right; }

    /* ── Progress dots ── */
    .progress-bar { display:flex; justify-content:center; gap:8px; padding:16px 24px 8px;
                    flex-wrap:wrap; }
    .dot { width:32px; height:32px; border-radius:50%; border:2px solid var(--line);
           background:var(--paper); display:flex; align-items:center; justify-content:center;
           font-size:.78rem; font-weight:700; cursor:pointer; font-family:system-ui,sans-serif;
           transition:all .15s; }
    .dot:hover { border-color:var(--accent); }
    .dot.current { background:var(--current-bg); border-color:var(--current); color:var(--current); }
    .dot.answered { background:var(--answered-bg); border-color:var(--answered); color:var(--answered); }
    .dot.skipped  { background:var(--skipped-bg); border-color:var(--skipped); color:var(--skipped); }

    /* ── Main content ── */
    .page { width:min(760px,calc(100vw - 32px)); margin:24px auto 80px; }
    .q-card { background:var(--paper); border:1px solid var(--line); border-radius:20px;
              padding:32px; box-shadow:0 10px 30px rgba(78,55,32,.08); }
    .q-meta { display:flex; justify-content:space-between; align-items:center;
              flex-wrap:wrap; gap:8px; margin-bottom:24px; }
    .q-meta-left { display:flex; align-items:center; gap:10px; }
    .q-counter { font-size:1rem; color:var(--muted); font-family:system-ui,sans-serif; }
    .q-source { font-size:.85rem; color:var(--muted); font-family:system-ui,sans-serif;
                background:var(--accent-soft); color:var(--accent); padding:4px 12px;
                border-radius:999px; font-weight:600; }
    .copy-btn { appearance:none; background:none; border:1px solid var(--line); border-radius:8px;
                padding:4px 10px; font-size:.8rem; font-family:system-ui,sans-serif;
                color:var(--muted); cursor:pointer; transition:all .15s; white-space:nowrap; }
    .copy-btn:hover { border-color:var(--accent); color:var(--accent); }
    .copy-btn.copied { border-color:var(--answered); color:var(--answered); }
    .q-text { font-size:1.35rem; line-height:1.85; margin-bottom:32px; }
    .q-text p { margin:.5em 0; }
    .q-text strong { color:#213647; }
    .answer-label { font-size:.88rem; font-weight:700; color:var(--muted);
                    text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px;
                    font-family:system-ui,sans-serif; }
    textarea { width:100%; min-height:120px; padding:14px 16px; font:inherit; font-size:1.05rem;
               border:1px solid var(--line); border-radius:12px; background:#fafafa;
               resize:vertical; outline:none; transition:border-color .15s; line-height:1.6; }
    textarea:focus { border-color:var(--accent); background:#fff; }

    /* ── Navigation ── */
    .nav { display:flex; justify-content:space-between; align-items:center;
           margin-top:24px; flex-wrap:wrap; gap:10px; }
    .nav-left, .nav-right { display:flex; gap:10px; }
    .btn { appearance:none; border:1px solid var(--line); background:#fff; color:var(--ink);
           font:inherit; font-weight:600; padding:10px 20px; border-radius:999px;
           cursor:pointer; text-decoration:none; font-size:.95rem; transition:all .15s; }
    .btn:hover { border-color:var(--accent); color:var(--accent); }
    .btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .btn-primary:hover { opacity:.85; color:#fff; }
    .btn-skip { color:var(--skipped); border-color:var(--skipped-bg); background:var(--skipped-bg); }
    .btn-skip:hover { background:var(--skipped); color:#fff; border-color:var(--skipped); }
    .btn-submit { background:#166534; color:#fff; border-color:#166534; }
    .btn-submit:hover { opacity:.85; color:#fff; }
    .btn:disabled { opacity:.4; cursor:not-allowed; }

    /* ── Summary screen ── */
    .summary-card { background:var(--paper); border:1px solid var(--line); border-radius:20px;
                    padding:32px; box-shadow:0 10px 30px rgba(78,55,32,.08); }
    .summary-card h2 { margin:0 0 16px; font-size:1.5rem; }
    .summary-list { list-style:none; padding:0; margin:0 0 24px; display:grid; gap:8px; }
    .summary-list li { display:flex; justify-content:space-between; padding:10px 14px;
                       background:#f9f7f3; border-radius:10px; font-size:.93rem;
                       font-family:system-ui,sans-serif; }
    .status-answered { color:var(--answered); font-weight:700; }
    .status-skipped  { color:var(--skipped);  font-weight:700; }
    .status-empty    { color:var(--muted); }

    /* ── Overlay ── */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex;
               align-items:center; justify-content:center; z-index:200; }
    .overlay-box { background:#fff; border-radius:16px; padding:32px; max-width:420px;
                   width:calc(100% - 32px); text-align:center; }
    .overlay-box h2 { margin:0 0 12px; font-size:1.4rem; }
    .overlay-box p { color:var(--muted); margin:0 0 20px; }
    .overlay-actions { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }

    .loading { text-align:center; padding:60px; color:var(--muted); font-size:1.1rem; }
    .error-box { background:#fee2e2; color:#991b1b; border-radius:12px; padding:20px;
                 margin:20px; text-align:center; }
    @media (max-width: 720px) {
      .topbar { padding: 12px 16px; }
      .topbar-brand { width: 100%; }
      .topbar-title { order: 4; width: 100%; }
      .timer { margin-left: auto; }
      .page { width:min(760px,calc(100vw - 20px)); }
    }
  </style>
</head>
<body>

<div id="topbar" class="topbar" style="display:none">
  <div class="topbar-brand">
    <div class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 72 72" role="img" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="examBrandGlow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fff5da"/>
            <stop offset="55%" stop-color="#f3c98f"/>
            <stop offset="100%" stop-color="#cf7c43"/>
          </linearGradient>
        </defs>
        <rect width="72" height="72" rx="16" fill="url(#examBrandGlow)"/>
        <circle cx="36" cy="36" r="22" fill="none" stroke="#8b4a2c" stroke-width="2.4" opacity="0.35"/>
        <circle cx="36" cy="36" r="14" fill="none" stroke="#8b4a2c" stroke-width="1.7" opacity="0.22"/>
        <path d="M12 43 C21 28, 28 52, 37 37 S53 21, 60 33" fill="none" stroke="#134f59" stroke-width="3.2" stroke-linecap="round"/>
        <circle cx="24" cy="25" r="3.4" fill="#fff7f0" stroke="#8b4a2c" stroke-width="1.4"/>
        <circle cx="51" cy="21" r="2.8" fill="#fff7f0" stroke="#8b4a2c" stroke-width="1.2"/>
        <text x="36" y="53" text-anchor="middle" font-size="21" font-family="Georgia, serif" font-weight="700" fill="#8b4a2c">π</text>
      </svg>
    </div>
    <div>
      <span class="brand-eyebrow">Math Delight</span>
      <h1 class="brand-title">Algebra II Trig Tutor</h1>
    </div>
  </div>
  <nav class="topbar-nav" aria-label="Site sections">
    <a class="nav-pill" href="../index.html">Home</a>
    <a class="nav-pill" href="../library.html">Library</a>
    <a class="nav-pill" href="../live-tutor.html">Live Tutor</a>
    <a class="nav-pill active" href="index.html">Challenge Exams</a>
  </nav>
  <span class="topbar-title" id="exam-title"></span>
  <span class="timer" id="timer">0:00</span>
</div>
<div id="progress-bar" class="progress-bar" style="display:none"></div>
<div class="page">
  <div id="root"><div class="loading">Loading exam&hellip;</div></div>
</div>
<div id="overlay" class="overlay" style="display:none">
  <div class="overlay-box">
    <h2>Submit Exam?</h2>
    <p id="overlay-msg"></p>
    <div class="overlay-actions">
      <button class="btn" onclick="closeOverlay()">Go Back</button>
      <button class="btn btn-submit" onclick="doSubmit()">Submit</button>
    </div>
  </div>
</div>

<script>
// ── State ──
const S = {
  exam: null,
  idx: 0,            // current question index
  answers: {},       // qId → string
  timerSecs: 0,
  timerInterval: null,
  started: false,
  submitting: false,
};

const SESSION_KEY = 'math_tutor_challenge_session';

function saveSession() {
  if (!S.exam) return;
  localStorage.setItem(SESSION_KEY, JSON.stringify({
    exam_id: S.exam.id,
    exam_title: S.exam.title,
    idx: S.idx,
    answers: S.answers,
    timerSecs: S.timerSecs,
    savedAt: new Date().toISOString(),
  }));
}

function clearSession() {
  localStorage.removeItem(SESSION_KEY);
}

// ── Markdown renderer ──
function mdToHtml(text) {
  var dm = [], im = [];
  text = text.replace(/\\\[[\s\S]*?\\\]/g, function(m){ dm.push(m); return '\x00DM'+(dm.length-1)+'\x00'; });
  text = text.replace(/\\\([\s\S]*?\\\)|\$[^$\n]+\$/g, function(m){ im.push(m); return '\x00IM'+(im.length-1)+'\x00'; });
  text = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  text = text.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
  text = text.replace(/\n\n+/g,'</p><p>').replace(/\n/g,'<br>');
  dm.forEach(function(m,i){ text = text.replace('\x00DM'+i+'\x00', m); });
  im.forEach(function(m,i){ text = text.replace('\x00IM'+i+'\x00', m); });
  return '<p>'+text+'</p>';
}

// ── Timer ──
function startTimer() {
  if (S.timerInterval) return;
  S.started = true;
  S.timerInterval = setInterval(function(){
    S.timerSecs++;
    var m = Math.floor(S.timerSecs/60), s = S.timerSecs%60;
    document.getElementById('timer').textContent = m+':'+(s<10?'0':'')+s;
    if (S.timerSecs % 30 === 0) saveSession();
  }, 1000);
}

// ── Progress dots ──
function renderDots() {
  var bar = document.getElementById('progress-bar');
  bar.innerHTML = '';
  S.exam.questions.forEach(function(q, i){
    var dot = document.createElement('div');
    dot.className = 'dot';
    var ans = (S.answers[q.id] || '').trim();
    if (i === S.idx) dot.classList.add('current');
    else if (ans) dot.classList.add('answered');
    dot.textContent = i+1;
    dot.title = 'Question '+(i+1);
    dot.addEventListener('click', function(){ goTo(i); });
    bar.appendChild(dot);
  });
}

// ── Save current textarea answer ──
function saveCurrentAnswer() {
  if (!S.exam) return;
  var ta = document.getElementById('answer-input');
  if (ta) S.answers[S.exam.questions[S.idx].id] = ta.value;
}

// ── Render current question ──
function renderQuestion() {
  var q = S.exam.questions[S.idx];
  var total = S.exam.questions.length;
  var answered = Object.values(S.answers).filter(function(v){ return v.trim(); }).length;

  var root = document.getElementById('root');
  root.innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <div class="q-meta-left">
          <span class="q-counter">Question ${S.idx+1} of ${total}</span>
          <span class="q-source">${escHtml(q.source_label)}</span>
        </div>
        <button class="copy-btn" id="copy-btn" title="Copy question text">&#128203; Copy Question</button>
      </div>
      <div class="q-text" id="q-text-render"></div>
      <div class="answer-label">Your Answer</div>
      <textarea id="answer-input" placeholder="Write your answer here…" rows="5">${escHtml(S.answers[q.id]||'')}</textarea>
      <div class="nav">
        <div class="nav-left">
          <button class="btn" id="btn-prev" onclick="prev()" ${S.idx===0?'disabled':''}>&#8592; Prev</button>
        </div>
        <div class="nav-right">
          <button class="btn btn-skip" onclick="skip()">Skip &rarr;</button>
          ${S.idx < total-1
            ? '<button class="btn btn-primary" onclick="next()">Next &rarr;</button>'
            : '<button class="btn btn-submit" onclick="confirmSubmit()">Submit Exam &#10003;</button>'
          }
        </div>
      </div>
    </div>
  `;

  // Render math
  var el = document.getElementById('q-text-render');
  el.innerHTML = mdToHtml(q.text);
  if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([el]);

  // Copy button
  var copyBtn = document.getElementById('copy-btn');
  if (copyBtn) {
    copyBtn.addEventListener('click', function() {
      navigator.clipboard.writeText(q.text).then(function() {
        copyBtn.textContent = '✓ Copied!';
        copyBtn.classList.add('copied');
        setTimeout(function() {
          copyBtn.textContent = '📋 Copy Question';
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    });
  }

  // Focus textarea
  var ta = document.getElementById('answer-input');
  if (ta) ta.addEventListener('input', startTimer);

  renderDots();
}

// ── Navigation ──
function goTo(i) {
  saveCurrentAnswer();
  S.idx = Math.max(0, Math.min(i, S.exam.questions.length-1));
  saveSession();
  renderQuestion();
}
function next() { startTimer(); goTo(S.idx+1); }
function prev() { saveCurrentAnswer(); goTo(S.idx-1); }
function skip() {
  startTimer();
  saveCurrentAnswer();
  if (S.idx < S.exam.questions.length-1) goTo(S.idx+1);
}

// ── Submit flow ──
function confirmSubmit() {
  saveCurrentAnswer();
  var total = S.exam.questions.length;
  var answered = S.exam.questions.filter(function(q){ return (S.answers[q.id]||'').trim(); }).length;
  var unanswered = total - answered;
  var msg = answered === total
    ? 'All '+total+' questions answered.'
    : answered+' of '+total+' answered. '+unanswered+' question(s) left blank.';
  document.getElementById('overlay-msg').textContent = msg;
  document.getElementById('overlay').style.display = 'flex';
}
function closeOverlay() {
  document.getElementById('overlay').style.display = 'none';
}
async function doSubmit() {
  if (S.submitting) return;
  S.submitting = true;
  closeOverlay();
  if (S.timerInterval) clearInterval(S.timerInterval);

  var payload = {
    exam_id: S.exam.id,
    exam_title: S.exam.title,
    time_seconds: S.timerSecs,
    answers: S.exam.questions.map(function(q){
      return {
        question_id: q.id,
        source_label: q.source_label,
        question_text: q.text,
        answer: S.answers[q.id] || '',
      };
    }),
  };

  document.getElementById('root').innerHTML = '<div class="loading">Saving result&hellip;</div>';

  try {
    var res = await fetch('submit.php', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload),
    });
    var data = await res.json();
    if (data.token) {
      clearSession();
      window.location.href = 'result.php?token='+encodeURIComponent(data.token);
    } else {
      throw new Error(data.error || 'Unknown error');
    }
  } catch(e) {
    S.submitting = false;
    document.getElementById('root').innerHTML =
      '<div class="error-box">Could not save result: '+escHtml(e.message)+'<br><br><button class="btn" onclick="location.reload()">Try Again</button></div>';
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ──
(async function() {
  var params = new URLSearchParams(window.location.search);
  var examId = params.get('id');
  if (!examId) {
    document.getElementById('root').innerHTML = '<div class="error-box">No exam ID specified. <a href="index.html">Back to exams</a></div>';
    return;
  }

  try {
    var res = await fetch('exams/' + encodeURIComponent(examId) + '.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    S.exam = await res.json();
  } catch(e) {
    document.getElementById('root').innerHTML = '<div class="error-box">Could not load exam "'+escHtml(examId)+'". <a href="index.html">Back to exams</a></div>';
    return;
  }

  document.title = S.exam.title + ' — Challenge Exam';
  document.getElementById('exam-title').textContent = S.exam.title;
  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('progress-bar').style.display = 'flex';

  // Restore saved session if it matches this exam
  try {
    var saved = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
    if (saved && saved.exam_id === S.exam.id) {
      S.idx = saved.idx || 0;
      S.answers = saved.answers || {};
      S.timerSecs = saved.timerSecs || 0;
      var rm = Math.floor(S.timerSecs/60), rs = S.timerSecs%60;
      document.getElementById('timer').textContent = rm+':'+(rs<10?'0':'')+rs;
    }
  } catch(e) { /* ignore corrupt storage */ }

  renderQuestion();
})();
</script>
</body>
</html>
