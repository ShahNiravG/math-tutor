<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Challenge Exam</title>
  <script>window.MathJax={tex:{inlineMath:[['\\(','\\)'],['$','$']],displayMath:[['\\[','\\]'],['$$','$$']]},options:{skipHtmlTags:['script','noscript','style','textarea','pre']}};</script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    :root { --bg:#f5f1e8; --paper:#fffaf2; --ink:#1f2a33; --muted:#5b6a74;
            --accent:#a14d2e; --accent-soft:#ead2c5; --line:#d8cfc2;
            --answered:#166534; --answered-bg:#dcfce7;
            --current:#1e40af; --current-bg:#dbeafe;
            --correct:#166534; --correct-bg:#dcfce7;
            --wrong:#dc2626;   --wrong-bg:#fee2e2; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Georgia,"Times New Roman",serif; color:var(--ink);
           background:radial-gradient(circle at top left,#f8dfc8 0,transparent 28%),
                      linear-gradient(180deg,#f6efe3 0%,var(--bg) 100%);
           min-height:100vh; }

    /* ── Top bar ── */
    .topbar { position:sticky; top:0; z-index:100; background:rgba(255,250,242,.95);
              backdrop-filter:blur(8px); border-bottom:1px solid var(--line);
              padding:12px 24px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
    .topbar-title { font-weight:700; font-size:1rem; flex:1; }
    .timer { font-family:system-ui,monospace; font-size:1.1rem; font-weight:700;
             color:var(--accent); min-width:56px; text-align:right; }

    /* ── Progress dots ── */
    .progress-bar { display:flex; justify-content:center; gap:8px; padding:16px 24px 8px;
                    flex-wrap:wrap; }
    .dot { width:32px; height:32px; border-radius:50%; border:2px solid var(--line);
           background:var(--paper); display:flex; align-items:center; justify-content:center;
           font-size:.78rem; font-weight:700; cursor:pointer; font-family:system-ui,sans-serif;
           transition:all .15s; }
    .dot:hover { border-color:var(--accent); }
    .dot.current  { background:var(--current-bg); border-color:var(--current); color:var(--current); }
    .dot.answered { background:var(--answered-bg); border-color:var(--answered); color:var(--answered); }

    /* ── Main content ── */
    .page { width:min(760px,calc(100vw - 32px)); margin:24px auto 80px; }
    .q-card { background:var(--paper); border:1px solid var(--line); border-radius:20px;
              padding:32px; box-shadow:0 10px 30px rgba(78,55,32,.08); }
    .q-meta { display:flex; justify-content:space-between; align-items:center;
              flex-wrap:wrap; gap:8px; margin-bottom:24px; }
    .q-meta-left { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .q-counter { font-size:1rem; color:var(--muted); font-family:system-ui,sans-serif; }
    .q-source { font-size:.85rem; font-family:system-ui,sans-serif;
                background:var(--accent-soft); color:var(--accent); padding:4px 12px;
                border-radius:999px; font-weight:600; }
    .copy-btn { appearance:none; background:none; border:1px solid var(--line); border-radius:8px;
                padding:4px 10px; font-size:.8rem; font-family:system-ui,sans-serif;
                color:var(--muted); cursor:pointer; transition:all .15s; white-space:nowrap; }
    .copy-btn:hover { border-color:var(--accent); color:var(--accent); }
    .copy-btn.copied { border-color:var(--answered); color:var(--answered); }
    .q-text { font-size:1.35rem; line-height:1.85; margin-bottom:28px; }
    .q-text p { margin:.5em 0; }
    .q-text strong { color:#213647; }

    /* ── MCQ options ── */
    .answer-label { font-size:.88rem; font-weight:700; color:var(--muted);
                    text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px;
                    font-family:system-ui,sans-serif; }
    .mcq-feedback { padding:10px 16px; border-radius:10px; font-weight:700; font-size:.95rem;
                    font-family:system-ui,sans-serif; margin-bottom:12px; }
    .mcq-feedback-correct { background:var(--correct-bg); color:var(--correct); }
    .mcq-feedback-wrong   { background:var(--wrong-bg);   color:var(--wrong); }
    .mcq-options { display:flex; flex-direction:column; gap:10px; margin-bottom:28px; }
    .mcq-option { display:flex; align-items:flex-start; gap:14px; padding:14px 18px;
                  border:2px solid var(--line); border-radius:12px; background:var(--paper);
                  text-align:left; cursor:pointer; font:inherit; font-size:1.05rem;
                  line-height:1.6; transition:all .15s; width:100%; }
    .mcq-option:not(:disabled):hover { border-color:var(--accent); background:#fffaf0; }
    .mcq-option:disabled { cursor:default; }
    .opt-letter { font-weight:700; font-size:1rem; font-family:system-ui,sans-serif;
                  min-width:26px; color:var(--muted); padding-top:2px; flex-shrink:0; }
    .opt-text { flex:1; }
    .opt-text p { margin:0; }
    .mcq-option.opt-correct { border-color:var(--correct); background:var(--correct-bg); }
    .mcq-option.opt-correct .opt-letter { color:var(--correct); }
    .mcq-option.opt-wrong   { border-color:var(--wrong);   background:var(--wrong-bg); }
    .mcq-option.opt-wrong   .opt-letter { color:var(--wrong); }
    .mcq-option.opt-reveal  { border-color:var(--correct); background:var(--correct-bg); opacity:.85; }
    .mcq-option.opt-reveal  .opt-letter { color:var(--correct); }

    /* ── Navigation ── */
    .nav { display:flex; justify-content:space-between; align-items:center;
           margin-top:24px; flex-wrap:wrap; gap:10px; }
    .nav-left, .nav-right { display:flex; gap:10px; }
    .btn { appearance:none; border:1px solid var(--line); background:#fff; color:var(--ink);
           font:inherit; font-weight:600; padding:10px 20px; border-radius:999px;
           cursor:pointer; text-decoration:none; font-size:.95rem; transition:all .15s; }
    .btn:hover { border-color:var(--accent); color:var(--accent); }
    .btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .btn-primary:hover { opacity:.85; color:#fff; }
    .btn-submit { background:#166534; color:#fff; border-color:#166534; }
    .btn-submit:hover { opacity:.85; color:#fff; }
    .btn:disabled { opacity:.4; cursor:not-allowed; }

    /* ── Overlay ── */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex;
               align-items:center; justify-content:center; z-index:200; }
    .overlay-box { background:#fff; border-radius:16px; padding:32px; max-width:420px;
                   width:calc(100% - 32px); text-align:center; }
    .overlay-box h2 { margin:0 0 12px; font-size:1.4rem; }
    .overlay-box p { color:var(--muted); margin:0 0 20px; }
    .overlay-actions { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }

    .loading { text-align:center; padding:60px; color:var(--muted); font-size:1.1rem; }
    .error-box { background:#fee2e2; color:#991b1b; border-radius:12px; padding:20px;
                 margin:20px; text-align:center; }
  </style>
</head>
<body>

<div id="topbar" class="topbar" style="display:none">
  <span class="topbar-title" id="exam-title"></span>
  <span class="timer" id="timer">0:00</span>
</div>
<div id="progress-bar" class="progress-bar" style="display:none"></div>
<div class="page">
  <div id="root"><div class="loading">Loading exam&hellip;</div></div>
</div>
<div id="overlay" class="overlay" style="display:none">
  <div class="overlay-box">
    <h2>Submit Exam?</h2>
    <p id="overlay-msg"></p>
    <div class="overlay-actions">
      <button class="btn" onclick="closeOverlay()">Go Back</button>
      <button class="btn btn-submit" onclick="doSubmit()">Submit</button>
    </div>
  </div>
</div>

<script>
// ── State ──
const S = {
  exam: null,
  idx: 0,
  answers: {},       // qId → letter ('A'/'B'/'C'/'D') or ''
  timerSecs: 0,
  timerInterval: null,
  started: false,
  submitting: false,
};

const SESSION_KEY = 'math_tutor_challenge_session';

function saveSession() {
  if (!S.exam) return;
  localStorage.setItem(SESSION_KEY, JSON.stringify({
    exam_id: S.exam.id,
    exam_title: S.exam.title,
    idx: S.idx,
    answers: S.answers,
    timerSecs: S.timerSecs,
    savedAt: new Date().toISOString(),
  }));
}

function clearSession() {
  localStorage.removeItem(SESSION_KEY);
}

// ── Markdown + math renderer ──
function mdToHtml(text) {
  var dm = [], im = [];
  text = text.replace(/\\\[[\s\S]*?\\\]/g, function(m){ dm.push(m); return '\x00DM'+(dm.length-1)+'\x00'; });
  text = text.replace(/\\\([\s\S]*?\\\)|\$[^$\n]+\$/g, function(m){ im.push(m); return '\x00IM'+(im.length-1)+'\x00'; });
  text = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  text = text.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
  text = text.replace(/\n\n+/g,'</p><p>').replace(/\n/g,'<br>');
  dm.forEach(function(m,i){ text = text.replace('\x00DM'+i+'\x00', m); });
  im.forEach(function(m,i){ text = text.replace('\x00IM'+i+'\x00', m); });
  return '<p>'+text+'</p>';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Timer ──
function startTimer() {
  if (S.timerInterval) return;
  S.started = true;
  S.timerInterval = setInterval(function(){
    S.timerSecs++;
    var m = Math.floor(S.timerSecs/60), s = S.timerSecs%60;
    document.getElementById('timer').textContent = m+':'+(s<10?'0':'')+s;
    if (S.timerSecs % 30 === 0) saveSession();
  }, 1000);
}

// ── Progress dots ──
function renderDots() {
  var bar = document.getElementById('progress-bar');
  bar.innerHTML = '';
  S.exam.questions.forEach(function(q, i){
    var dot = document.createElement('div');
    dot.className = 'dot';
    if (i === S.idx) dot.classList.add('current');
    else if (S.answers[q.id]) dot.classList.add('answered');
    dot.textContent = i+1;
    dot.title = 'Question '+(i+1);
    dot.addEventListener('click', function(){ goTo(i); });
    bar.appendChild(dot);
  });
}

// ── Select MCQ option ──
function selectOption(letter) {
  startTimer();
  var q = S.exam.questions[S.idx];
  if (S.answers[q.id]) return; // already answered, locked
  S.answers[q.id] = letter;
  saveSession();
  renderQuestion();
}

// ── Render current question ──
function renderQuestion() {
  var q = S.exam.questions[S.idx];
  var total = S.exam.questions.length;
  var answered = S.answers[q.id] || '';

  // Feedback banner (shown after answering)
  var feedbackHtml = '';
  if (answered) {
    var isCorrect = (answered === q.correct);
    feedbackHtml = '<div class="mcq-feedback ' + (isCorrect ? 'mcq-feedback-correct' : 'mcq-feedback-wrong') + '">' +
      (isCorrect
        ? '&#10003; Correct!'
        : '&#10007; Incorrect \u2014 correct answer: <strong>' + escHtml(q.correct) + '</strong>') +
      '</div>';
  }

  // MCQ options
  var optHtml = '<div class="answer-label">Your Answer</div>' + feedbackHtml +
    '<div class="mcq-options" id="mcq-opts">';
  (q.options || []).forEach(function(optStr) {
    var m = optStr.match(/^\(([A-D])\)\s*([\s\S]*)/);
    if (!m) return;
    var letter = m[1], text = m[2].trim();
    var cls = 'mcq-option', letterDisp = letter;
    if (answered) {
      if (letter === answered && letter === q.correct)      { cls += ' opt-correct'; letterDisp = '\u2713'; }
      else if (letter === answered && letter !== q.correct) { cls += ' opt-wrong';   letterDisp = '\u2717'; }
      else if (letter === q.correct)                        { cls += ' opt-reveal'; }
    }
    var disabled = answered ? ' disabled' : '';
    var onclick  = answered ? '' : ' onclick="selectOption(\'' + letter + '\')"';
    optHtml += '<button class="' + cls + '"' + disabled + onclick + '>' +
      '<span class="opt-letter">' + escHtml(letterDisp) + '</span>' +
      '<span class="opt-text" data-raw="' + escHtml(text) + '"></span>' +
      '</button>';
  });
  optHtml += '</div>';

  // Navigation
  var isLast = (S.idx === total - 1);
  var navHtml = '<div class="nav"><div class="nav-left">' +
    '<button class="btn" onclick="goTo(' + (S.idx-1) + ')"' + (S.idx===0?' disabled':'') + '>&#8592; Prev</button>' +
    '</div><div class="nav-right">';
  if (!isLast) {
    navHtml += '<button class="btn btn-primary" onclick="goTo(' + (S.idx+1) + ')">Next &#8594;</button>';
  } else {
    navHtml += '<button class="btn btn-submit" onclick="confirmSubmit()">Submit Exam &#10003;</button>';
  }
  navHtml += '</div></div>';

  var root = document.getElementById('root');
  root.innerHTML = '<div class="q-card">' +
    '<div class="q-meta"><div class="q-meta-left">' +
    '<span class="q-counter">Question ' + (S.idx+1) + ' of ' + total + '</span>' +
    '<span class="q-source">' + escHtml(q.source_label) + '</span>' +
    '</div>' +
    '<button class="copy-btn" id="copy-btn">&#128203; Copy Question</button>' +
    '</div>' +
    '<div class="q-text" id="q-text-render"></div>' +
    optHtml + navHtml + '</div>';

  // Render question text
  document.getElementById('q-text-render').innerHTML = mdToHtml(q.text);

  // Render option texts (may contain LaTeX)
  root.querySelectorAll('.opt-text[data-raw]').forEach(function(el){
    el.innerHTML = mdToHtml(el.dataset.raw);
    el.removeAttribute('data-raw');
  });

  // Typeset all math in one pass
  if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([root]);

  // Copy button
  document.getElementById('copy-btn').addEventListener('click', function(){
    navigator.clipboard.writeText(q.text).then(function(){
      var btn = document.getElementById('copy-btn');
      if (!btn) return;
      btn.textContent = '\u2713 Copied!';
      btn.classList.add('copied');
      setTimeout(function(){
        var b = document.getElementById('copy-btn');
        if (b) { b.textContent = '\uD83D\uDCCB Copy Question'; b.classList.remove('copied'); }
      }, 2000);
    });
  });

  renderDots();
}

// ── Navigation ──
function goTo(i) {
  S.idx = Math.max(0, Math.min(i, S.exam.questions.length - 1));
  saveSession();
  renderQuestion();
}

// ── Submit flow ──
function confirmSubmit() {
  var total = S.exam.questions.length;
  var answered = S.exam.questions.filter(function(q){ return S.answers[q.id]; }).length;
  var unanswered = total - answered;
  var msg = answered === total
    ? 'All ' + total + ' questions answered.'
    : answered + ' of ' + total + ' answered. ' + unanswered + ' question(s) left blank.';
  document.getElementById('overlay-msg').textContent = msg;
  document.getElementById('overlay').style.display = 'flex';
}
function closeOverlay() {
  document.getElementById('overlay').style.display = 'none';
}
async function doSubmit() {
  if (S.submitting) return;
  S.submitting = true;
  closeOverlay();
  if (S.timerInterval) clearInterval(S.timerInterval);

  var payload = {
    exam_id: S.exam.id,
    exam_title: S.exam.title,
    time_seconds: S.timerSecs,
    answers: S.exam.questions.map(function(q){
      return {
        question_id: q.id,
        source_label: q.source_label,
        question_text: q.text,
        options: q.options || [],
        correct: q.correct || '',
        answer: S.answers[q.id] || '',
      };
    }),
  };

  document.getElementById('root').innerHTML = '<div class="loading">Saving result&hellip;</div>';

  try {
    var res = await fetch('submit.php', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });
    var data = await res.json();
    if (data.token) {
      clearSession();
      window.location.href = 'result.php?token=' + encodeURIComponent(data.token);
    } else {
      throw new Error(data.error || 'Unknown error');
    }
  } catch(e) {
    S.submitting = false;
    document.getElementById('root').innerHTML =
      '<div class="error-box">Could not save result: ' + escHtml(e.message) +
      '<br><br><button class="btn" onclick="location.reload()">Try Again</button></div>';
  }
}

// ── Boot ──
(async function() {
  var params = new URLSearchParams(window.location.search);
  var examId = params.get('id');
  if (!examId) {
    document.getElementById('root').innerHTML =
      '<div class="error-box">No exam ID specified. <a href="index.html">Back to exams</a></div>';
    return;
  }

  try {
    var res = await fetch('exams/' + encodeURIComponent(examId) + '.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    S.exam = await res.json();
  } catch(e) {
    document.getElementById('root').innerHTML =
      '<div class="error-box">Could not load exam "' + escHtml(examId) + '". <a href="index.html">Back to exams</a></div>';
    return;
  }

  document.title = S.exam.title + ' \u2014 Challenge Exam';
  document.getElementById('exam-title').textContent = S.exam.title;
  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('progress-bar').style.display = 'flex';

  // Restore saved session if it matches this exam
  try {
    var saved = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
    if (saved && saved.exam_id === S.exam.id) {
      S.idx = saved.idx || 0;
      S.answers = saved.answers || {};
      S.timerSecs = saved.timerSecs || 0;
      var rm = Math.floor(S.timerSecs/60), rs = S.timerSecs%60;
      document.getElementById('timer').textContent = rm + ':' + (rs<10?'0':'') + rs;
    }
  } catch(e) { /* ignore corrupt storage */ }

  renderQuestion();
})();
</script>
</body>
</html>
