<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Challenge Exams</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --paper: #fffaf2;
      --ink: #1f2a33;
      --muted: #5b6a74;
      --accent: #a14d2e;
      --accent-soft: #ead2c5;
      --line: #d8cfc2;
      --teal: #134f59;
      --teal-light: #e0f2f5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, #f8dfc8 0, transparent 28%),
        linear-gradient(180deg, #f6efe3 0%, var(--bg) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .page {
      width: min(540px, calc(100vw - 32px));
      padding: 48px 0 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    .back-link {
      align-self: flex-start;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: .9rem;
      margin-bottom: 32px;
    }
    .back-link:hover { text-decoration: underline; }

    /* Hero */
    .hero-icon {
      font-size: 4rem;
      line-height: 1;
      margin-bottom: 16px;
      animation: bounce 2.4s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .hero-heading {
      font-size: 2rem;
      margin: 0 0 8px;
      text-align: center;
      color: var(--teal);
    }
    .hero-sub {
      color: var(--muted);
      text-align: center;
      margin: 0 0 36px;
      font-size: 1rem;
      line-height: 1.5;
    }

    /* Challenge card */
    .challenge-card {
      width: 100%;
      background: var(--paper);
      border: 1.5px solid var(--line);
      border-radius: 24px;
      padding: 32px 28px 28px;
      box-shadow: 0 8px 32px rgba(78, 55, 32, .10);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .card-label {
      font-size: .78rem;
      font-family: system-ui, sans-serif;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .card-title {
      font-size: 1.55rem;
      font-weight: 700;
      margin: 0;
      line-height: 1.2;
    }
    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-family: system-ui, sans-serif;
    }
    .tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: .82rem;
      font-weight: 600;
    }
    .tag-mm  { background: #dbeafe; color: #1e40af; }
    .tag-op  { background: #dcfce7; color: #166534; }
    .tag-ch  { background: var(--teal-light); color: var(--teal); }
    .tag-q   { background: var(--accent-soft); color: var(--accent); }

    .start-btn {
      display: block;
      text-align: center;
      text-decoration: none;
      background: var(--teal);
      color: #fff;
      font: inherit;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 16px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: background .15s, transform .1s;
      margin-top: 4px;
    }
    .start-btn:hover { background: #0d3347; transform: translateY(-1px); }
    .start-btn:active { transform: translateY(0); }

    .another-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      color: var(--muted);
      font-size: .9rem;
      font-family: system-ui, sans-serif;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .another-link:hover { color: var(--ink); }

    /* Resume card */
    .resume-card {
      width: 100%;
      background: #f0fdf4;
      border: 1.5px solid #86efac;
      border-radius: 24px;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }
    .resume-label {
      font-size: .78rem;
      font-family: system-ui, sans-serif;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #166534;
    }
    .resume-title { font-size: 1.15rem; font-weight: 700; margin: 0; }
    .resume-meta { font-size: .85rem; font-family: system-ui, sans-serif; color: var(--muted); }
    .resume-actions { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-top: 4px; }
    .resume-btn {
      display: inline-block;
      text-decoration: none;
      background: #166534;
      color: #fff;
      font: inherit;
      font-size: .95rem;
      font-weight: 700;
      padding: 10px 22px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: opacity .15s;
    }
    .resume-btn:hover { opacity: .85; }
    .discard-link {
      font-size: .82rem;
      font-family: system-ui, sans-serif;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .discard-link:hover { color: #991b1b; }

    /* Loading / error */
    .loading {
      color: var(--muted);
      font-size: 1.1rem;
      text-align: center;
      padding: 40px 0;
    }
    .error-box {
      background: #fee2e2;
      color: #991b1b;
      border-radius: 12px;
      padding: 20px;
      font-size: .95rem;
    }
  </style>
</head>
<body>
<div class="page">
  <a class="back-link" href="../index.html">&#8592; Back to Library</a>

  <div class="hero-icon">&#127942;</div>
  <h1 class="hero-heading">Ready for a Challenge?</h1>
  <p class="hero-sub">A timed mix of Mental Math &amp; Olympiad Problems.<br>10 questions, picked just for you.</p>
  <p id="bundle-info" style="font-size:.78rem;font-family:system-ui,sans-serif;color:var(--muted);margin:0 0 28px;"></p>

  <div id="resume-container" style="width:100%"></div>
  <div id="root"><div class="loading">Loading&hellip;</div></div>
</div>

<script>
const SESSION_KEY = 'math_tutor_challenge_session';

function renderResumeCard() {
  try {
    var saved = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
    if (!saved || !saved.exam_id) return;

    var answered = Object.values(saved.answers || {}).filter(function(v){ return v.trim(); }).length;
    var m = Math.floor((saved.timerSecs || 0) / 60), s = (saved.timerSecs || 0) % 60;
    var timeStr = m + ':' + (s < 10 ? '0' : '') + s;
    var questionStr = 'Question ' + ((saved.idx || 0) + 1) + ' of 10';
    var answeredStr = answered + ' answered';

    var container = document.getElementById('resume-container');
    container.innerHTML = `
      <div class="resume-card">
        <div class="resume-label">&#9654; Resume where you left off</div>
        <p class="resume-title">${saved.exam_title || 'Challenge Exam'}</p>
        <div class="resume-meta">${questionStr} &middot; ${answeredStr} &middot; ${timeStr} elapsed</div>
        <div class="resume-actions">
          <a class="resume-btn" href="exam.html?id=${encodeURIComponent(saved.exam_id)}">Continue Challenge &rarr;</a>
          <button class="discard-link" id="discard-btn">Discard &amp; start fresh</button>
        </div>
      </div>
    `;

    document.getElementById('discard-btn').addEventListener('click', function() {
      localStorage.removeItem(SESSION_KEY);
      container.innerHTML = '';
    });
  } catch(e) { /* ignore corrupt storage */ }
}

renderResumeCard();

(async function () {
  const root = document.getElementById('root');
  let exams = [];

  let data;
  try {
    const res = await fetch('exams-index.json');
    data = await res.json();
    exams = data.exams || [];
  } catch (e) {
    root.innerHTML = '<div class="error-box">Could not load exams. Please try again later.</div>';
    return;
  }

  if (!exams.length) {
    root.innerHTML = '<div class="error-box">No exams found.</div>';
    return;
  }

  // Show bundle timestamp
  if (data.generated_at) {
    const d = new Date(data.generated_at);
    const label = d.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
    document.getElementById('bundle-info').textContent =
      `${exams.length} exams · Bundle generated ${label}`;
  }

  // Track recently shown exams to avoid immediate repeats
  const shown = new Set();

  function pickRandom() {
    // Reset if we've exhausted all exams
    if (shown.size >= exams.length) shown.clear();
    let exam;
    do { exam = exams[Math.floor(Math.random() * exams.length)]; }
    while (shown.has(exam.id));
    shown.add(exam.id);
    return exam;
  }

  function render(exam) {
    const mm = exam.mm;
    const op = exam.op;
    const chapters = exam.chapters || [];
    const chapterText = chapters.length > 5
      ? chapters.slice(0, 4).join(', ') + ` +${chapters.length - 4} more`
      : chapters.join(', ');

    root.innerHTML = `
      <div class="challenge-card">
        <div class="card-label">Your Challenge</div>
        <p class="card-title">${exam.title}</p>
        <div class="tag-row">
          <span class="tag tag-q">10 Questions</span>
          <span class="tag tag-mm">${mm} Mental Math</span>
          <span class="tag tag-op">${op} Olympiad</span>
        </div>
        <div class="tag-row">
          <span class="tag tag-ch">Chapters: ${chapterText}</span>
        </div>
        <a class="start-btn" href="exam.html?id=${encodeURIComponent(exam.id)}">Start Challenge! &rarr;</a>
      </div>
      <button class="another-link" id="another-btn">&#128256; Try a Different Challenge</button>
    `;

    document.getElementById('another-btn').addEventListener('click', function () {
      render(pickRandom());
    });
  }

  render(pickRandom());
})();
</script>
</body>
</html>
